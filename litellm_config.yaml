model_list:
  - model_name: GigaChat
    litellm_params:
      model: gigachat/GigaChat
      api_key: os.environ/GIGACHAT_CREDENTIALS
      api_base: os.environ/GIGACHAT_API_BASE_URL
      ssl_verify: false
  - model_name: gpt-4o
    litellm_params:
      model: gigachat/GigaChat
      api_key: os.environ/GIGACHAT_CREDENTIALS
      api_base: os.environ/GIGACHAT_API_BASE_URL
      ssl_verify: false
  - model_name: gpt-4o-mini
    litellm_params:
      model: gigachat/GigaChat
      api_key: os.environ/GIGACHAT_CREDENTIALS
      api_base: os.environ/GIGACHAT_API_BASE_URL
      ssl_verify: false
  - model_name: gpt-4
    litellm_params:
      model: gigachat/GigaChat
      api_key: os.environ/GIGACHAT_CREDENTIALS
      api_base: os.environ/GIGACHAT_API_BASE_URL
      ssl_verify: false
  - model_name: "*"
    litellm_params:
      model: gigachat/GigaChat
      api_key: os.environ/GIGACHAT_CREDENTIALS
      api_base: os.environ/GIGACHAT_API_BASE_URL
      ssl_verify: false

general_settings:
  master_key: os.environ/PROXY_API_KEY

litellm_settings:
  drop_params: true
  ssl_verify: false
  num_retries: 3
  request_timeout: 120
  telemetry: false
